<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住毛山日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            max-width: 380px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #fff;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        }
        
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 300;
            color: #000;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 24px;
        }
        
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .month-title {
            font-size: 18px;
            font-weight: 600;
            color: #000;
        }
        .nav-btn {
            font-size: 18px;
            color: #007aff;
            text-decoration: none;
            padding: 2px;
            cursor: pointer;
        }
        .nav-btn.disabled {
            color: #ccc;
            pointer-events: none;
        }
        .nav-btns {
            display: flex;
            gap: 0;
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 6px;
        }
        .weekday {
            font-size: 12px;
            font-weight: 600;
            color: #8e8e93;
            padding: 6px 0;
        }
        
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .day {
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 8px;
            transition: all 0.15s;
        }
        .day:hover {
            background: #f5f5f7;
        }
        .day .date {
            font-size: 15px;
            font-weight: 500;
            color: #000;
            margin-bottom: 2px;
        }
        .day .btns {
            display: flex;
            gap: 3px;
        }
        .day .btn {
            display: block;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 3px;
            text-decoration: none;
            min-width: 20px;
            text-align: center;
        }
        .day .btn.noon {
            background: #007aff;
            color: #fff;
        }
        .day .btn.evening {
            background: #5856d6;
            color: #fff;
        }
        .day.weekend .date {
            color: #8e8e93;
        }
        .day.today {
            background: #007aff;
        }
        .day.today .date {
            color: #fff;
        }
        .day.today .btn {
            background: #fff;
            color: #007aff;
        }
        .day.other {
            opacity: 0.3;
        }
        .day.empty {
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div class="title">📰 住毛山日报</div>
    <div class="subtitle">每天 12:00 · 20:00 更新</div>
    
    <div class="month-header">
        <span class="month-title" id="monthTitle">2026年3月</span>
        <div class="nav-btns">
            <a class="nav-btn" id="prevMonth" href="?m=2">◀</a>
            <a class="nav-btn" id="todayBtn" href="?">当月</a>
            <a class="nav-btn" id="nextMonth" href="?m=4">▶</a>
        </div>
    </div>
    
    <div class="weekdays">
        <div class="weekday">日</div>
        <div class="weekday">一</div>
        <div class="weekday">二</div>
        <div class="weekday">三</div>
        <div class="weekday">四</div>
        <div class="weekday">五</div>
        <div class="weekday">六</div>
    </div>
    
    <div class="days" id="calendar"></div>

    <script>
    const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    
    function getUrlParam(name) {
        const params = new URLSearchParams(window.location.search);
        return parseInt(params.get(name)) || new Date().getMonth() + 1;
    }
    
    function renderCalendar(year, month) {
        const today = new Date();
        const isCurrentMonth = today.getFullYear() === year && today.getMonth() + 1 === month;
        const todayDate = today.getDate();
        
        // 获取当月1日是周几 (0=周日, 1=周一...)
        const firstDay = new Date(year, month - 1, 1).getDay();
        // 获取当月有多少天
        const daysInMonth = new Date(year, month, 0).getDate();
        
        const monthTitle = document.getElementById('monthTitle');
        monthTitle.textContent = year + '年' + month + '月';
        
        // 更新导航链接
        const prevBtn = document.getElementById('prevMonth');
        const nextBtn = document.getElementById('nextMonth');
        
        if (month === 1) {
            prevBtn.href = '?y=' + (year-1) + '&m=12';
        } else {
            prevBtn.href = '?m=' + (month - 1);
        }
        
        if (month === 12) {
            nextBtn.href = '?y=' + (year+1) + '&m=1';
        } else {
            nextBtn.href = '?m=' + (month + 1);
        }
        
        // 禁用未来月份的下一页
        if (year > today.getFullYear() || (year === today.getFullYear() && month > today.getMonth() + 1)) {
            nextBtn.classList.add('disabled');
            nextBtn.href = 'javascript:void(0)';
        } else {
            nextBtn.classList.remove('disabled');
        }
        
        const container = document.getElementById('calendar');
        container.innerHTML = '';
        
        // 计算需要显示的天数（包括上月和下月的填充）
        // 周一=0, 周日=0，调整为周一=0
        const startPadding = firstDay;
        
        // 渲染上月的填充
        const prevMonth = month === 1 ? 12 : month - 1;
        const prevYear = month === 1 ? year - 1 : year;
        const daysInPrevMonth = new Date(prevYear, prevMonth, 0).getDate();
        
        for (let i = startPadding - 1; i >= 0; i--) {
            const day = document.createElement('div');
            day.className = 'day other empty';
            day.innerHTML = '<span class="date">' + (daysInPrevMonth - i) + '</span>';
            container.appendChild(day);
        }
        
        // 渲染当月 - 只显示今天及以前的速递
        const dispatchData = {
            3: { 
                26: ['evening'],
                27: ['noon', 'evening']
            }
        };
        
        // 检查日期是否在今天或之前
        function isPastOrToday(y, m, d) {
            const today = new Date();
            const check = new Date(y, m - 1, d);
            return check <= today;
        }
        
        for (let d = 1; d <= daysInMonth; d++) {
            const day = document.createElement('div');
            const date = new Date(year, month - 1, d);
            const weekday = date.getDay();
            const isWeekend = weekday === 0 || weekday === 6;
            
            let classes = ['day'];
            if (d === todayDate && isCurrentMonth) classes.push('today');
            if (isWeekend) classes.push('weekend');
            if (!isCurrentMonth && d > todayDate) classes.push('other');
            
            day.className = classes.join(' ');
            
            let html = '<span class="date">' + d + '</span>';
            
            // 检查是否有速递（只显示今天及之前的）
            if (dispatchData[month] && dispatchData[month][d] && isPastOrToday(year, month, d)) {
                const btns = dispatchData[month][d];
                if (btns.length > 0) {
                    html += '<div class="btns">';
                    if (btns.includes('noon')) {
                        const href = `daily/${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}.html`;
                        html += '<a class="btn noon" href="' + href + '">午</a>';
                    }
                    if (btns.includes('evening')) {
                        const href = `evening/晚间速递_${year}${String(month).padStart(2,'0')}${String(d).padStart(2,'0')}.html`;
                        html += '<a class="btn evening" href="' + href + '">晚</a>';
                    }
                    html += '</div>';
                }
            }
            
            day.innerHTML = html;
            container.appendChild(day);
        }
        
        // 填充下月
        const totalCells = startPadding + daysInMonth;
        const remaining = 42 - totalCells; // 6行 x 7天
        for (let d = 1; d <= remaining; d++) {
            const day = document.createElement('div');
            day.className = 'day other empty';
            day.innerHTML = '<span class="date">' + d + '</span>';
            container.appendChild(day);
        }
    }
    
    // 解析URL参数
    const params = new URLSearchParams(window.location.search);
    let year = parseInt(params.get('y')) || new Date().getFullYear();
    let month = getUrlParam('m');
    
    renderCalendar(year, month);
    </script>
</body>
</html>
