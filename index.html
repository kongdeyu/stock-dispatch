<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住毛山日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px 20px;
            background: #fff;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 300;
            color: #000;
            margin-bottom: 6px;
        }
        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
        }
        
        .list {
            list-style: none;
        }
        .list-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #eee;
            text-decoration: none;
            color: #333;
        }
        .list-item:hover {
            background: #f9f9f9;
            margin: 0 -20px;
            padding: 14px 20px;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item.today {
            background: #f0f7ff;
            margin: 0 -20px;
            padding: 14px 20px;
            border-radius: 8px;
        }
        .date {
            width: 60px;
            font-size: 15px;
            font-weight: 500;
            color: #000;
        }
        .tags {
            flex: 1;
            display: flex;
            gap: 6px;
        }
        .tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            color: #fff;
        }
        .tag.noon {
            background: #007aff;
        }
        .tag.evening {
            background: #5856d6;
        }
        .arrow {
            color: #ccc;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="title">📬 住毛山日报</div>
    <div class="subtitle">每天 12:00 · 20:00 更新</div>
    
    <ul class="list">
        <li class="list-item today">
            <span class="date">03-26</span>
            <div class="tags">
                <span class="tag noon">午间</span>
                <span class="tag evening">晚间</span>
            </div>
            <span class="arrow">›</span>
        </li>
        <li class="list-item">
            <span class="date">03-27</span>
            <div class="tags">
                <span class="tag evening">晚间</span>
            </div>
            <span class="arrow">›</span>
        </li>
        <li class="list-item">
            <span class="date">03-28</span>
            <div class="tags">
            </div>
            <span class="arrow">›</span>
        </li>
        <li class="list-item">
            <span class="date">03-29</span>
            <div class="tags">
            </div>
            <span class="arrow">›</span>
        </li>
        <li class="list-item">
            <span class="date">03-30</span>
            <div class="tags">
                <span class="tag noon">午间</span>
            </div>
            <span class="arrow">›</span>
        </li>
        <li class="list-item">
            <span class="date">03-31</span>
            <div class="tags">
                <span class="tag evening">晚间</span>
            </div>
            <span class="arrow">›</span>
        </li>
        <li class="list-item">
            <span class="date">04-01</span>
            <div class="tags">
            </div>
            <span class="arrow">›</span>
        </li>
        <li class="list-item">
            <span class="date">04-02</span>
            <div class="tags">
            </div>
            <span class="arrow">›</span>
        </li>
        <li class="list-item">
            <span class="date">04-03</span>
            <div class="tags">
                <span class="tag noon">午间</span>
            </div>
            <span class="arrow">›</span>
        </li>
    </ul>
</body>
</html>
