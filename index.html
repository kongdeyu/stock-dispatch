<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住毛山日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .title-section {
            text-align: left;
        }
        .title {
            font-size: 28px;
            color: #fff;
            font-weight: 700;
        }
        .subtitle {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }
        .month-nav {
            display: flex;
            gap: 8px;
        }
        .nav-btn {
            padding: 8px 14px;
            background: #2d2d44;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: #4a4a6a;
        }
        .nav-btn.current {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .month-label {
            grid-column: 1 / -1;
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            margin: 10px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .day-header {
            text-align: center;
            color: #666;
            font-size: 12px;
            padding: 8px 0;
        }
        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2d2d44;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .day:hover {
            background: #4a4a6a;
            transform: scale(1.05);
        }
        .day.empty {
            background: transparent;
            cursor: default;
        }
        .day.empty:hover {
            transform: none;
            background: transparent;
        }
        .day.has-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .day.has-content:hover {
            background: linear-gradient(135deg, #7b8ff0 0%, #8a5cb5 100%);
        }
        .day.today {
            border: 2px solid #00d9ff;
        }
        .day.other-month {
            opacity: 0.3;
        }
        .tag {
            font-size: 9px;
            margin-top: 2px;
            opacity: 0.8;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 12px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #888;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 4px;
        }
        .legend-dot.content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .legend-dot.today {
            background: #2d2d44;
            border: 2px solid #00d9ff;
        }
        
        .link-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .link-list a {
            display: block;
            padding: 12px;
            background: #2d2d44;
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s;
        }
        .link-list a:hover {
            background: #4a4a6a;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title-section">
            <div class="title">🧚 住毛山日报</div>
            <div class="subtitle">每天中午12点、晚上8点更新</div>
        </div>
        <div class="month-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">上月</button>
            <button class="nav-btn current" onclick="goToCurrentMonth()">当月</button>
            <button class="nav-btn" onclick="changeMonth(1)">下月</button>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot content"></div>
            <span>有内容</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot today"></div>
            <span>今天</span>
        </div>
    </div>

    <div class="calendar" id="calendar">
        <!-- 日历由JS生成 -->
    </div>

    <div class="footer">
        由 GitHub Pages 托管
    </div>

    <script>
        // 有内容的日期记录
        const contentDates = {
            '2026-03-26': '晚'
        };
        
        let currentDate = new Date(2026, 2, 26); // 当前显示的月份
        const today = new Date(2026, 2, 26);
        
        function getMonthKey(year, month) {
            return `${year}-${String(month + 1).padStart(2, '0')}`;
        }
        
        function formatDateKey(year, month, day) {
            return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        }
        
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // 标题
            let html = `<div class="month-label">${year}年${month + 1}月</div>`;
            
            // 星期头
            const dayNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            dayNames.forEach(name => {
                html += `<div class="day-header">${name}</div>`;
            });
            
            // 获取当月第一天和最后一天
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            
            // 计算日历开始（周一作为开始）
            let startDayOfWeek = firstDay.getDay() - 1;
            if (startDayOfWeek < 0) startDayOfWeek = 6;
            
            // 上月日期
            const prevMonthLastDay = new Date(year, month, 0).getDate();
            for (let i = startDayOfWeek - 1; i >= 0; i--) {
                const day = prevMonthLastDay - i;
                const isToday = year === today.getFullYear() && month === today.getMonth() && day === today.getDate();
                html += `<div class="day other-month">${day}</div>`;
            }
            
            // 当月日期
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const dateKey = formatDateKey(year, month, day);
                const hasContent = contentDates[dateKey];
                const isToday = year === today.getFullYear() && month === today.getMonth() && day === today.getDate();
                
                let classes = 'day';
                if (hasContent) classes += ' has-content';
                if (isToday) classes += ' today';
                
                let content = day;
                if (hasContent) {
                    content += `<span class="tag">${hasContent}</span>`;
                }
                
                html += `<div class="${classes}">${content}</div>`;
            }
            
            // 下月日期补齐
            const totalCells = startDayOfWeek + lastDay.getDate();
            const remainingCells = 7 - (totalCells % 7);
            if (remainingCells < 7) {
                for (let day = 1; day <= remainingCells; day++) {
                    html += `<div class="day other-month">${day}</div>`;
                }
            }
            
            calendar.innerHTML = html;
        }
        
        function changeMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            renderCalendar();
        }
        
        function goToCurrentMonth() {
            currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
            renderCalendar();
        }
        
        // 初始化
        renderCalendar();
    </script>
</body>
</html>
