<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住毛山日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            max-width: 400px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #fff;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        }
        
        .title {
            text-align: center;
            font-size: 32px;
            font-weight: 300;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #86868b;
            margin-bottom: 30px;
        }
        
        .month {
            background: #fff;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            padding: 16px;
        }
        
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .month-title {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
        }
        .nav a {
            font-size: 14px;
            color: #007aff;
            text-decoration: none;
            margin-left: 12px;
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 8px;
        }
        .weekday {
            font-size: 11px;
            font-weight: 600;
            color: #86868b;
            padding: 8px 0;
        }
        
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .day {
            height: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: #1d1d1f;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
        }
        .day:hover {
            background: #f5f5f7;
        }
        .day.has::after {
            content: '';
            width: 4px;
            height: 4px;
            background: #007aff;
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
        }
        .day.today {
            background: #007aff;
            color: #fff;
        }
        .day.today.has::after {
            background: #fff;
        }
        .day.other {
            color: #d2d2d7;
        }
        
        .legend {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #86868b;
        }
    </style>
</head>
<body>
    <div class="title">📅 住毛山日报</div>
    <div class="subtitle">每天 12:00 · 20:00 更新</div>
    
    <div class="month">
        <div class="month-header">
            <span class="month-title">三月 2026</span>
            <div class="nav">
                <a href="?m=2">上月</a>
                <a href="?">今天</a>
                <a href="?m=4">下月</a>
            </div>
        </div>
        
        <div class="weekdays">
            <div class="weekday">一</div>
            <div class="weekday">二</div>
            <div class="weekday">三</div>
            <div class="weekday">四</div>
            <div class="weekday">五</div>
            <div class="weekday">六</div>
            <div class="weekday">日</div>
        </div>
        
        <div class="days">
            <div class="day other">23</div>
            <div class="day other">24</div>
            <div class="day other">25</div>
            <div class="day has today">26</div>
            <div class="day">27</div>
            <div class="day">28</div>
            <div class="day">29</div>
            
            <div class="day">30</div>
            <div class="day">31</div>
            <div class="day other">1</div>
            <div class="day other">2</div>
            <div class="day other">3</div>
            <div class="day other">4</div>
            <div class="day other">5</div>
            
            <div class="day other">6</div>
            <div class="day other">7</div>
            <div class="day other">8</div>
            <div class="day other">9</div>
            <div class="day other">10</div>
            <div class="day other">11</div>
            <div class="day other">12</div>
            
            <div class="day other">13</div>
            <div class="day other">14</div>
            <div class="day other">15</div>
            <div class="day other">16</div>
            <div class="day other">17</div>
            <div class="day other">18</div>
            <div class="day other">19</div>
            
            <div class="day other">20</div>
            <div class="day other">21</div>
            <div class="day other">22</div>
            <div class="day other">23</div>
            <div class="day other">24</div>
            <div class="day other">25</div>
            <div class="day other">26</div>
        </div>
    </div>
    
    <div class="legend">
        蓝点 = 有内容 &nbsp;|&nbsp; 蓝色背景 = 今天
    </div>
</body>
</html>
