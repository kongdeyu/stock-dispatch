<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住毛山日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .header {
            text-align: center;
            margin-bottom: 10px;
        }
        .title {
            font-size: 20px;
            color: #fff;
            font-weight: 700;
        }
        .subtitle {
            color: #888;
            font-size: 11px;
            margin-top: 2px;
        }
        .month-nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .nav-btn {
            padding: 4px 10px;
            background: #2d2d44;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            text-decoration: none;
        }
        .nav-btn.current {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-top: 8px;
        }
        .month-label {
            grid-column: 1 / -1;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin: 8px 0 5px 0;
            padding-bottom: 4px;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        .day-header {
            text-align: center;
            color: #666;
            font-size: 10px;
            padding: 2px 0;
        }
        .day {
            height: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2d2d44;
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
        }
        .day.has-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .day.today {
            border: 1px solid #00d9ff;
        }
        .day.other-month {
            opacity: 0.3;
        }
        .tag {
            font-size: 7px;
        }
        
        .footer {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 10px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
            font-size: 10px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">🧚 住毛山日报</div>
        <div class="subtitle">每天12点、20点更新</div>
        
        <div class="month-nav">
            <a href="?month=2" class="nav-btn">← 上月</a>
            <a href="?" class="nav-btn current">2026年3月</a>
            <a href="?month=4" class="nav-btn">下月 →</a>
        </div>
    </div>

    <div class="legend">
        <span>🟣 有内容</span>
        <span>🔵 今天</span>
    </div>

    <div class="calendar">
        <div class="month-label">2026年3月</div>
        
        <div class="day-header">一</div>
        <div class="day-header">二</div>
        <div class="day-header">三</div>
        <div class="day-header">四</div>
        <div class="day-header">五</div>
        <div class="day-header">六</div>
        <div class="day-header">日</div>

        <div class="day other-month">23</div>
        <div class="day other-month">24</div>
        <div class="day other-month">25</div>
        <div class="day has-content today">26<span class="tag">晚</span></div>
        <div class="day">27</div>
        <div class="day">28</div>
        <div class="day">29</div>

        <div class="day">30</div>
        <div class="day">31</div>
        <div class="day other-month">1</div>
        <div class="day other-month">2</div>
        <div class="day other-month">3</div>
        <div class="day other-month">4</div>
        <div class="day other-month">5</div>
    </div>

    <div class="footer">
        GitHub Pages 托管
    </div>
</body>
</html>
