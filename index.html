<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住毛山日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            max-width: 380px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #fff;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
        }
        
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 300;
            color: #000;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 24px;
        }
        
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .month-title {
            font-size: 18px;
            font-weight: 600;
            color: #000;
        }
        .nav-btn {
            font-size: 18px;
            color: #007aff;
            text-decoration: none;
            padding: 2px;
            cursor: pointer;
        }
        .nav-btn.disabled {
            color: #ccc;
            pointer-events: none;
        }
        .nav-btns {
            display: flex;
            gap: 0;
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 6px;
        }
        .weekday {
            font-size: 12px;
            font-weight: 600;
            color: #8e8e93;
            padding: 6px 0;
        }
        
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .day {
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 8px;
            transition: all 0.15s;
        }
        .day:hover {
            background: #f5f5f7;
        }
        .day .date {
            font-size: 15px;
            font-weight: 500;
            color: #000;
            margin-bottom: 2px;
        }
        .day .btns {
            display: flex;
            gap: 3px;
        }
        .day .btn {
            display: block;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 3px;
            text-decoration: none;
            min-width: 20px;
            text-align: center;
        }
        .day .btn.noon {
            background: #007aff;
            color: #fff;
        }
        .day .btn.evening {
            background: #5856d6;
            color: #fff;
        }
        .day.weekend .date {
            color: #8e8e93;
        }
        .day.today {
            background: #007aff;
        }
        .day.today .date {
            color: #fff;
        }
        .day.today .btn {
            background: #fff;
            color: #007aff;
        }
        .day.other {
            opacity: 0.3;
        }
        .day.empty {
            visibility: hidden;
        }
        .loading {
            text-align: center;
            color: #8e8e93;
            font-size: 12px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="title">📰 住毛山日报</div>
    <div class="subtitle">每天 12:00 · 20:00 更新</div>
    
    <div class="month-header">
        <span class="month-title" id="monthTitle">2026年3月</span>
        <div class="nav-btns">
            <a class="nav-btn" id="prevMonth" href="?m=2">◀</a>
            <a class="nav-btn" id="todayBtn" href="?">当月</a>
            <a class="nav-btn" id="nextMonth" href="?m=4">▶</a>
        </div>
    </div>
    
    <div class="weekdays">
        <div class="weekday">日</div>
        <div class="weekday">一</div>
        <div class="weekday">二</div>
        <div class="weekday">三</div>
        <div class="weekday">四</div>
        <div class="weekday">五</div>
        <div class="weekday">六</div>
    </div>
    
    <div class="days" id="calendar">
        <div class="loading">加载中...</div>
    </div>

    <script>
    // 自动从GitHub API获取速递文件列表
    let dispatchData = {};
    let currentYear, currentMonth;
    
    async function fetchDispatchData() {
        try {
            // 并行获取daily和evening目录
            const [dailyResp, eveningResp] = await Promise.all([
                fetch('https://api.github.com/repos/kongdeyu/stock-dispatch/contents/daily'),
                fetch('https://api.github.com/repos/kongdeyu/stock-dispatch/contents/evening')
            ]);
            
            const dailyFiles = await dailyResp.json();
            const eveningFiles = await eveningResp.json();
            
            // 解析daily目录 (文件名格式: 2026-03-27.html)
            if (Array.isArray(dailyFiles)) {
                dailyFiles.forEach(f => {
                    const match = f.name.match(/^(\d{4})-(\d{2})-(\d{2})\.html$/);
                    if (match) {
                        const m = parseInt(match[2]);
                        const d = parseInt(match[3]);
                        if (!dispatchData[m]) dispatchData[m] = {};
                        if (!dispatchData[m][d]) dispatchData[m][d] = [];
                        dispatchData[m][d].push('noon');
                    }
                });
            }
            
            // 解析evening目录 (文件名格式: 晚间速递_20260327.html)
            if (Array.isArray(eveningFiles)) {
                eveningFiles.forEach(f => {
                    const match = f.name.match(/^晚间速递_(\d{4})(\d{2})(\d{2})\.html$/);
                    if (match) {
                        const m = parseInt(match[2]);
                        const d = parseInt(match[3]);
                        if (!dispatchData[m]) dispatchData[m] = {};
                        if (!dispatchData[m][d]) dispatchData[m][d] = [];
                        dispatchData[m][d].push('evening');
                    }
                });
            }
            
            console.log('Loaded dispatch data:', dispatchData);
        } catch (e) {
            console.error('Failed to fetch dispatch data:', e);
        }
    }
    
    function renderCalendar(year, month) {
        const today = new Date();
        const isCurrentMonth = today.getFullYear() === year && today.getMonth() + 1 === month;
        const todayDate = today.getDate();
        
        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        
        const monthTitle = document.getElementById('monthTitle');
        monthTitle.textContent = year + '年' + month + '月';
        
        const prevBtn = document.getElementById('prevMonth');
        const nextBtn = document.getElementById('nextMonth');
        
        if (month === 1) {
            prevBtn.href = '?y=' + (year-1) + '&m=12';
        } else {
            prevBtn.href = '?m=' + (month - 1);
        }
        
        if (month === 12) {
            nextBtn.href = '?y=' + (year+1) + '&m=1';
        } else {
            nextBtn.href = '?m=' + (month + 1);
        }
        
        if (year > today.getFullYear() || (year === today.getFullYear() && month > today.getMonth() + 1)) {
            nextBtn.classList.add('disabled');
            nextBtn.href = 'javascript:void(0)';
        } else {
            nextBtn.classList.remove('disabled');
        }
        
        const container = document.getElementById('calendar');
        container.innerHTML = '';
        
        const startPadding = firstDay;
        const prevMonth = month === 1 ? 12 : month - 1;
        const prevYear = month === 1 ? year - 1 : year;
        const daysInPrevMonth = new Date(prevYear, prevMonth, 0).getDate();
        
        // 上月填充
        for (let i = startPadding - 1; i >= 0; i--) {
            const day = document.createElement('div');
            day.className = 'day other empty';
            day.innerHTML = '<span class="date">' + (daysInPrevMonth - i) + '</span>';
            container.appendChild(day);
        }
        
        // 当月
        for (let d = 1; d <= daysInMonth; d++) {
            const day = document.createElement('div');
            const date = new Date(year, month - 1, d);
            const weekday = date.getDay();
            const isWeekend = weekday === 0 || weekday === 6;
            
            let classes = ['day'];
            if (d === todayDate && isCurrentMonth) classes.push('today');
            if (isWeekend) classes.push('weekend');
            if (!isCurrentMonth && d > todayDate) classes.push('other');
            
            day.className = classes.join(' ');
            
            let html = '<span class="date">' + d + '</span>';
            
            // 检查是否有速递
            const checkDate = new Date(year, month - 1, d);
            if (dispatchData[month] && dispatchData[month][d] && checkDate <= today) {
                const btns = dispatchData[month][d];
                if (btns.length > 0) {
                    html += '<div class="btns">';
                    if (btns.includes('noon')) {
                        html += '<a class="btn noon" href="daily/' + year + '-' + String(month).padStart(2,'0') + '-' + String(d).padStart(2,'0') + '.html">午</a>';
                    }
                    if (btns.includes('evening')) {
                        html += '<a class="btn evening" href="evening/晚间速递_' + year + String(month).padStart(2,'0') + String(d).padStart(2,'0') + '.html">晚</a>';
                    }
                    html += '</div>';
                }
            }
            
            day.innerHTML = html;
            container.appendChild(day);
        }
        
        // 下月填充
        const totalCells = startPadding + daysInMonth;
        const remaining = 42 - totalCells;
        for (let d = 1; d <= remaining; d++) {
            const day = document.createElement('div');
            day.className = 'day other empty';
            day.innerHTML = '<span class="date">' + d + '</span>';
            container.appendChild(day);
        }
    }
    
    async function init() {
        const params = new URLSearchParams(window.location.search);
        currentYear = parseInt(params.get('y')) || new Date().getFullYear();
        currentMonth = parseInt(params.get('m')) || new Date().getMonth() + 1;
        
        await fetchDispatchData();
        renderCalendar(currentYear, currentMonth);
    }
    
    init();
    </script>
</body>
</html>
