<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住毛山日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #f5f0e6 0%, #e8e0d0 100%);
            min-height: 100vh;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .title {
            text-align: center;
            font-size: 24px;
            color: #8B0000;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .calendar {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .month-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .month-label {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .nav-btns a {
            padding: 5px 12px;
            background: #f0f0f0;
            border-radius: 6px;
            color: #666;
            text-decoration: none;
            font-size: 12px;
            margin-left: 5px;
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .day {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: #333;
            font-size: 14px;
        }
        .day.has-content {
            background: #8B0000;
            color: #fff;
        }
        .day.today {
            border: 2px solid #8B0000;
        }
        .day.other-month {
            color: #ccc;
        }
        
        .legend {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="title">📬 住毛山日报</div>
    
    <div class="calendar">
        <div class="month-row">
            <span class="month-label">2026年3月</span>
            <div class="nav-btns">
                <a href="?month=2">上月</a>
                <a href="?">当月</a>
                <a href="?month=4">下月</a>
            </div>
        </div>
        
        <div class="weekdays">
            <div>一</div>
            <div>二</div>
            <div>三</div>
            <div>四</div>
            <div>五</div>
            <div>六</div>
            <div>日</div>
        </div>
        
        <div class="days">
            <div class="day other-month">23</div>
            <div class="day other-month">24</div>
            <div class="day other-month">25</div>
            <div class="day has-content today">26</div>
            <div class="day">27</div>
            <div class="day">28</div>
            <div class="day">29</div>
            
            <div class="day">30</div>
            <div class="day">31</div>
            <div class="day other-month">1</div>
            <div class="day other-month">2</div>
            <div class="day other-month">3</div>
            <div class="day other-month">4</div>
            <div class="day other-month">5</div>
            
            <div class="day other-month">6</div>
            <div class="day other-month">7</div>
            <div class="day other-month">8</div>
            <div class="day other-month">9</div>
            <div class="day other-month">10</div>
            <div class="day other-month">11</div>
            <div class="day other-month">12</div>
            
            <div class="day other-month">13</div>
            <div class="day other-month">14</div>
            <div class="day other-month">15</div>
            <div class="day other-month">16</div>
            <div class="day other-month">17</div>
            <div class="day other-month">18</div>
            <div class="day other-month">19</div>
            
            <div class="day other-month">20</div>
            <div class="day other-month">21</div>
            <div class="day other-month">22</div>
            <div class="day other-month">23</div>
            <div class="day other-month">24</div>
            <div class="day other-month">25</div>
            <div class="day other-month">26</div>
        </div>
    </div>
    
    <div class="legend">
        🟤 有内容 &nbsp;&nbsp; 🔴 今天
    </div>
</body>
</html>
