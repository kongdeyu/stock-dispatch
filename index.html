<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住毛山日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .title {
            font-size: 32px;
            color: #fff;
            font-weight: 700;
        }
        .subtitle {
            color: #888;
            font-size: 13px;
            margin-top: 6px;
        }
        .month-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .nav-btn {
            padding: 10px 20px;
            background: #2d2d44;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: #4a4a6a;
        }
        .nav-btn.current {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 20px;
        }
        .month-label {
            grid-column: 1 / -1;
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            margin: 20px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            text-align: center;
        }
        .day-header {
            text-align: center;
            color: #666;
            font-size: 12px;
            padding: 8px 0;
        }
        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #2d2d44;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .day.has-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .day.today {
            border: 2px solid #00d9ff;
        }
        .day.other-month {
            opacity: 0.3;
        }
        .tag {
            font-size: 9px;
            margin-top: 2px;
            opacity: 0.8;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 12px;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 4px;
        }
        .legend-dot.content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .legend-dot.today {
            background: #2d2d44;
            border: 2px solid #00d9ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">🧚 住毛山日报</div>
        <div class="subtitle">每天中午12点、晚上8点更新</div>
        
        <!-- 月份导航 - 三个链接到不同月份 -->
        <div class="month-nav">
            <a href="?month=2" class="nav-btn">← 上月</a>
            <a href="?" class="nav-btn current">2026年3月</a>
            <a href="?month=4" class="nav-btn">下月 →</a>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot content"></div>
            <span>有内容</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot today"></div>
            <span>今天</span>
        </div>
    </div>

    <!-- 2026年3月 -->
    <div class="calendar">
        <div class="month-label">2026年3月</div>
        
        <div class="day-header">周一</div>
        <div class="day-header">周二</div>
        <div class="day-header">周三</div>
        <div class="day-header">周四</div>
        <div class="day-header">周五</div>
        <div class="day-header">周六</div>
        <div class="day-header">周日</div>

        <!-- 第一周 -->
        <div class="day other-month">23</div>
        <div class="day other-month">24</div>
        <div class="day other-month">25</div>
        <div class="day has-content today">26<span class="tag">晚</span></div>
        <div class="day">27</div>
        <div class="day">28</div>
        <div class="day">29</div>

        <!-- 第二周 -->
        <div class="day">30</div>
        <div class="day">31</div>
        <div class="day other-month">1</div>
        <div class="day other-month">2</div>
        <div class="day other-month">3</div>
        <div class="day other-month">4</div>
        <div class="day other-month">5</div>
    </div>

    <div class="footer">
        由 GitHub Pages 托管
    </div>
</body>
</html>
